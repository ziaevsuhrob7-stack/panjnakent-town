        document.getElementById('doLoginBtn').addEventListener('click', function() {
          var e = document.getElementById('lEmail').value.trim();
          var p = document.getElementById('lPass').value.trim();
          if(!e || !p) { showToast(t('fillFields'), true); return; }
          
          var btn = document.getElementById('doLoginBtn');
          
          // Firebase Auth
          if (window._firebase && window._firebase.auth && window._firebase.auth.app.options.apiKey !== 'YOUR_API_KEY') {
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Вход...';
            window._firebase.signInWithEmailAndPassword(window._firebase.auth, e, p)
              .then(function() { modal.remove(); })
              .catch(function(err) {
                btn.disabled = false;
                btn.innerHTML = t('login');
                if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
                  showToast(t('invalid'), true);
                } else {
                  showToast('Firebase: ' + err.message, true);
                }
              });
            return;
          }
          
          // Fallback: localStorage
          var u = CITY_DATA.users.find(function(u){ return u.email===e && u.password===p; });

          if(u) { currentUser = u; localStorage.setItem('pt_user', JSON.stringify(currentUser)); updateUI(); showToast(t('welcome') + ', ' + u.name + '!'); modal.remove(); }
          else { showToast(t('invalid'), true); }

      function openRegister() {
        var modal = createModal('', '', null);
        modal.querySelector('.modal-content').innerHTML = '<div class="auth-form"><h2 style="text-align:center;margin-bottom:20px;background:linear-gradient(135deg, var(--primary), var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">📝 ' + t('register') + '</h2><input class="auth-input" id="rName" placeholder="Имя"><input class="auth-input" id="rEmail" placeholder="Email"><input class="auth-input" id="rPhone" placeholder="+992 XX XXX XX XX" id="phoneInput" maxlength="20"><input class="auth-input" id="rPass" type="password" placeholder="Пароль"><input class="auth-input" id="rPass2" type="password" placeholder="Подтвердите пароль"><div class="recaptcha-note">🛡️ Данные защищены Firebase Authentication.</div><button class="auth-btn" id="doRegisterBtn"><i class="fas fa-shield-alt"></i> ' + t('register') + '</button><div class="auth-link" id="goLogin">❓ ' + t('login') + '</div></div>';
        document.getElementById('doRegisterBtn').addEventListener('click', function() {
          var btn = document.getElementById('doRegisterBtn');
          var n = document.getElementById('rName').value.trim();
          var e = document.getElementById('rEmail').value.trim();
          var ph = document.getElementById('rPhone').value.trim();

          btn.disabled = true;
          btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Регистрация...';
          
          // Firebase Auth Registration
          if (window._firebase && window._firebase.auth && window._firebase.auth.app.options.apiKey !== 'YOUR_API_KEY') {
            window._firebase.createUserWithEmailAndPassword(window._firebase.auth, e, p1)
              .then(function(userCredential) {
                var uid = userCredential.user.uid;
                var newUserData = {
                  id: Date.now(), userId: generateUserId(), name: n, role: 'user',
                  email: e, phone: ph, rating: 5.0, balance: 50,
                  registered: new Date().toISOString().split('T')[0],
                  reviews: [], productsCount: 0, lastActive: Date.now(),

                  firebaseUid: uid
                };
                // Save to Firestore
                return window._firebase.setDoc(
                  window._firebase.doc(window._firebase.db, 'users', uid),
                  newUserData
                ).then(function() {
                  // Also add to local CITY_DATA for immediate use
                  CITY_DATA.users.push(newUserData);
                  saveData();
                  return newUserData;
                });
              })
              .then(function(userData) {
                currentUser = userData;
                localStorage.setItem('pt_user', JSON.stringify(currentUser));
                updateUI();
                showToast(t('regSuccess'));
                modal.remove();
                checkDailyQuest('register');
                checkAchievements();
              })
              .catch(function(err) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-shield-alt"></i> ' + t('register');
                if (err.code === 'auth/email-already-in-use') {
                  showToast(t('emailExists'), true);
                } else if (err.code === 'auth/weak-password') {
                  showToast('Пароль должен быть не менее 6 символов', true);
                } else {
                  showToast('Firebase: ' + err.message, true);
                }
              });
            return;
          }
          
          // Fallback: localStorage
          if(CITY_DATA.users.find(function(u){ return u.email===e; })) { 
            showToast(t('emailExists'), true); 
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-shield-alt"></i> ' + t('register');
            return; 
          }
          var nu = { id: Date.now(), userId: generateUserId(), name: n, role: 'user', email: e, password: p1, phone: ph, rating: 5.0, balance: 50, registered: new Date().toISOString().split('T')[0], reviews: [], productsCount: 0, lastActive: Date.now(), experience: 0, banned: false, level: getLevel(0).name };
          CITY_DATA.users.push(nu);
          saveData();
          currentUser = nu;
          localStorage.setItem('pt_user', JSON.stringify(currentUser));
          updateUI();
          showToast(t('regSuccess'));
          modal.remove();
          checkDailyQuest('register');
          checkAchievements();
          checkReferral(n);
        });
        document.getElementById('goLogin').addEventListener('click', function() { modal.remove(); openLogin(); });
      }

      function checkLogin() {
        var s = localStorage.getItem('pt_user');

          try {
            var p = JSON.parse(s);

      function initVoiceSearch() {
        var voiceBtn = document.getElementById('voiceSearchBtn');

        voiceBtn.addEventListener('click', function() {
          if(!('webkitSpeechRecognition' in window)) { showToast('Голосовой поиск не поддерживается', true); return; }
          var recognition = new webkitSpeechRecognition();
          recognition.lang = 'ru-RU';
          recognition.continuous = false;
          recognition.interimResults = false;

          recognition.onresult = function(event) {

            document.getElementById('searchButton').click();
          };

                var img = new Image();
                img.onload = function() {
                  var canvas = document.createElement('canvas');
                  var mw = 1200, mh = 900;
                  var w = img.width, h = img.height;
                  if (w > mw) { h = Math.round(h*mw/w); w = mw; }
                  if (h > mh) { w = Math.round(w*mh/h); h = mh; }
                  canvas.width = w; canvas.height = h;
                  canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                  tmpPhotos.push(canvas.toDataURL('image/jpeg', 0.8));

        if (!currentUser) return;

        if (!questId) return;
        var quest = questDefs.find(function(q){ return q.id===questId; });
        if (!quest) return;
        if (!questProgress[questId]) questProgress[questId] = 0;
        if (questProgress[questId] < quest.max) {
          questProgress[questId]++;
          localStorage.setItem(dailyQuestKey, JSON.stringify(questProgress));
          if (questProgress[questId] >= quest.max) {
            currentUser.experience += quest.reward;
            saveData();
            showToast('✅ Квест выполнен: ' + quest.name + '! +' + quest.reward + ' XP');

      // ==================== PUSH УВЕДОМЛЕНИЯ ====================
      function requestPushPermission() {
        if (!('Notification' in window)) { showToast('Push-уведомления не поддерживаются', true); return; }
        if (Notification.permission === 'granted') { showToast('Push-уведомления уже включены!'); return; }
        Notification.requestPermission().then(function(permission){
          if (permission === 'granted') {
            showToast('Push-уведомления включены! 🔔');
            new Notification('Panjakent Town', { body: 'Вы будете получать уведомления о новых объявлениях!', icon: '🏔️' });

          var pts = [];
          for(var i=0;i<30;i++) pts.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2+0.5,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5});

            if(!document.getElementById('profParticles'))return;

              if(p.y<0)p.y=c.height; if(p.y>c.height)p.y=0;

    function addRipple(e) {

      var start=null;
      function step(ts){
        if(!start)start=ts;
        var p=Math.min((ts-start)/dur,1),e=1-Math.pow(1-p,3);
        el.textContent=Math.floor(e*target);
        if(p<1)requestAnimationFrame(step); else el.textContent=target;
      }
      requestAnimationFrame(step);

    // NOTIFICATION BADGE PULSE
    setInterval(function(){

<script>

  // ═══════════════════════════════════════════════════
  // 1. УТИЛИТА СЖАТИЯ ИЗОБРАЖЕНИЙ ЧЕРЕЗ CANVAS
  // Решает проблему: фото в обоях не сохраняются из-за
  // лимита localStorage (~5MB). Canvas сжимает до <500KB.
  // ═══════════════════════════════════════════════════
  function compressImage(dataUrl, maxWidth, maxHeight, quality, callback) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var w = img.width, h = img.height;
      // Масштабирование с сохранением пропорций
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      if (h > maxHeight) { w = Math.round(w * maxHeight / h); h = maxHeight; }
      canvas.width = w;
      canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      var compressed = canvas.toDataURL('image/jpeg', quality);
      callback(null, compressed);
    };
    img.onerror = function() { callback(new Error('Не удалось загрузить изображение')); };
    img.src = dataUrl;
  }

      card.innerHTML = imgSrc + '<div style="font-size:0.78rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+item.title+'</div><div style="font-size:0.82rem;font-weight:800;color:var(--primary);margin-top:3px;">'+item.price+' '+item.currency+'</div>';

  // ═══════════════════════════════════════════════════
  // 3. УМНАЯ КНОПКА "ПОДЕЛИТЬСЯ" — динамическая ссылка
  // ═══════════════════════════════════════════════════
  function patchShareButton() {
    // Перехватываем showItemDetails чтобы улучшить кнопку Share
    var origFn = window.showItemDetails;
    if (!origFn || window._v51sharePatched) return;
    window._v51sharePatched = true;

    window.showItemDetails = function(item) {
      origFn.call(this, item);
      setTimeout(function() {
        var shareBtn = document.getElementById('itemShareBtn');
        if (!shareBtn || shareBtn._v51patched) return;
        shareBtn._v51patched = true;

        shareBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          // Генерируем динамическую ссылку с параметрами товара
          var baseUrl = window.location.href.split('?')[0];
          var shareUrl = baseUrl + '?item=' + item.id + '&title=' + encodeURIComponent(item.title);
          var shareText = '🛍️ ' + item.title + '\n💰 ' + item.price + ' ' + (item.currency||'TJS') + '\n📍 ' + item.location + '\n\n👉 ' + shareUrl;

          if (navigator.share) {
            navigator.share({
              title: item.title,
              text: '💰 ' + item.price + ' ' + (item.currency||'TJS') + ' • ' + item.location,
              url: shareUrl
            }).catch(function(){});
          } else {
            navigator.clipboard ? navigator.clipboard.writeText(shareText).then(function(){
              if(window.showToast) window.showToast('📋 Ссылка скопирована!');
            }) : (function(){
              var ta = document.createElement('textarea');
              ta.value = shareText;
              document.body.appendChild(ta); ta.select();
              document.execCommand('copy'); document.body.removeChild(ta);
              if(window.showToast) window.showToast('📋 Ссылка скопирована!');
            })();
          }
        }, true); // capture=true чтобы перехватить перед старым обработчиком

        // Добавляем похожие товары
        var detailPage = document.getElementById('itemDetailPage');
        injectSimilarItems(detailPage, item);
      }, 400);
    };
  }

  // ═══════════════════════════════════════════════════
  // 4. FIREBASE SETUP GUIDE — инструкция в настройках
  // ═══════════════════════════════════════════════════
  function injectFirebaseGuide() {
    var isFirebaseReady = window._firebase && window._firebase.auth &&
      window._firebase.auth.app && window._firebase.auth.app.options.apiKey !== 'YOUR_API_KEY';

    if (isFirebaseReady) return; // Firebase уже настроен

    // Добавляем баннер при первом открытии настроек
    var origOpenSettings = window.openSettings;
    if (!origOpenSettings || window._v51settingsPatched) return;
    window._v51settingsPatched = true;

    window.openSettings = function() {
      origOpenSettings.call(this);
      setTimeout(function() {
        var modal = document.querySelector('.modal.active .modal-content');
        if (!modal || modal.querySelector('#firebaseGuide')) return;

        var guide = document.createElement('div');
        guide.id = 'firebaseGuide';
        guide.style.cssText = 'margin:16px 0;padding:16px;background:linear-gradient(135deg,rgba(245,158,11,0.1),rgba(239,68,68,0.08));border:1px solid rgba(245,158,11,0.3);border-radius:16px;';
        guide.innerHTML = [
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">',
            '<span style="font-size:1.3rem;">🔥</span>',
            '<strong style="color:#f59e0b;">База данных не подключена</strong>',
            '<span style="margin-left:auto;background:rgba(239,68,68,0.15);color:#ef4444;padding:2px 8px;border-radius:10px;font-size:0.7rem;font-weight:700;">OFFLINE</span>',
          '</div>',
          '<div style="font-size:0.8rem;color:var(--text-secondary);line-height:1.7;margin-bottom:12px;">',
            'Сейчас данные хранятся только на этом устройстве. Чтобы стать <strong>онлайн</strong> и синхронизировать данные между пользователями:',
          '</div>',
          '<div style="font-size:0.78rem;line-height:2;background:var(--surface);border-radius:12px;padding:10px 14px;border:1px solid var(--border);">',
            '<div>1️⃣ Откройте <a href="https://console.firebase.google.com" target="_blank" style="color:var(--primary);font-weight:700;">console.firebase.google.com</a></div>',
            '<div>2️⃣ Создайте новый проект</div>',
            '<div>3️⃣ Добавьте веб-приложение (значок &lt;/&gt;)</div>',
            '<div>4️⃣ Скопируйте <code style="background:var(--bg);padding:1px 5px;border-radius:4px;font-size:0.75rem;">firebaseConfig</code></div>',
            '<div>5️⃣ Вставьте в начало HTML-файла вместо <code style="background:var(--bg);padding:1px 5px;border-radius:4px;font-size:0.75rem;">YOUR_API_KEY</code></div>',
            '<div>6️⃣ Включите Firestore Database и Authentication → Email/Password</div>',
          '</div>',
          '<button id="copyFirebaseTemplate" style="margin-top:10px;width:100%;padding:10px;background:linear-gradient(135deg,#f59e0b,#d97706);color:white;border:none;border-radius:12px;cursor:pointer;font-weight:700;font-size:0.82rem;">📋 Скопировать шаблон конфига</button>'
        ].join('');

        // Вставляем в начало модального окна
        var firstGroup = modal.querySelector('.settings-group');
        if (firstGroup) modal.insertBefore(guide, firstGroup);

        document.getElementById('copyFirebaseTemplate')?.addEventListener('click', function() {
          var template = 'const firebaseConfig = {\n  apiKey: "СЮДА_ВСТАВИТЬ",\n  authDomain: "ВАШ_ПРОЕКТ.firebaseapp.com",\n  projectId: "ВАШ_ПРОЕКТ",\n  storageBucket: "ВАШ_ПРОЕКТ.appspot.com",\n  messagingSenderId: "123456789",\n  appId: "1:123456789:web:abc123"\n};';
          navigator.clipboard ? navigator.clipboard.writeText(template).then(function(){ if(window.showToast) window.showToast('📋 Шаблон скопирован!'); }) : null;
        });
      }, 300);
    };
  }

  // ═══════════════════════════════════════════════════
  // 5. LAZY LOADING ДЛЯ ВСЕХ ИЗОБРАЖЕНИЙ
  // ═══════════════════════════════════════════════════
  function applyLazyLoading() {
    // Для новых изображений добавленных в DOM
    var imgObserver = new MutationObserver(function(mutations) {
      mutations.forEach(function(mutation) {
        mutation.addedNodes.forEach(function(node) {
          if (node.nodeType !== 1) return;
          var imgs = node.tagName === 'IMG' ? [node] : Array.from(node.querySelectorAll('img'));
          imgs.forEach(function(img) {
            if (!img.hasAttribute('loading')) {
              img.setAttribute('loading', 'lazy');
            }
            // Добавляем плавное появление
            if (!img._lazyStyled) {
              img._lazyStyled = true;
              img.style.transition = 'opacity 0.3s ease';
              img.style.opacity = '0';
              img.addEventListener('load', function() {
                img.style.opacity = '1';
              });
              if (img.complete && img.naturalWidth) img.style.opacity = '1';
            }
          });
        });
      });
    });
    imgObserver.observe(document.body, { childList: true, subtree: true });
  }

  // ═══════════════════════════════════════════════════
  // 6. MOBILE UI IMPROVEMENTS
  // Исправляет вылезающие кнопки на телефоне
  // ═══════════════════════════════════════════════════
  function patchMobileUI() {
    var style = document.createElement('style');
    style.textContent = [
      // Фиксим кнопки которые вылезают на мобиле
      '@media (max-width: 320px) {

        '.header-btns { gap: 3px !important; }',
        '.btn { padding: 6px 8px !important; font-size: 0.7rem !important; }',
        '.widget-bar { gap: 8px !important; padding: 6px 10px !important; font-size: 0.75rem !important; }',
      '}',
      // Safe area для iPhone с чёлкой
      '@supports (padding-bottom: env(safe-area-inset-bottom)) {',
        '.bottom-nav { padding-bottom: calc(10px + env(safe-area-inset-bottom)) !important; }',
        'body { padding-bottom: calc(65px + env(safe-area-inset-bottom)) !important; }',
      '}',
      // Убираем лишние цвета — единый стиль кнопок действий
      '.card-actions .btn-green { background: linear-gradient(135deg, #10b981, #059669) !important; }',
      '.card-actions .btn-primary { background: linear-gradient(135deg, #0ea5e9, #0284c7) !important; }',
      // Улучшаем карточки: одинаковые радиусы и тени
      '.card { border-radius: 20px !important; }',
      '.card-img { border-radius: 14px !important; }',
      // Убираем мигающие/пульсирующие эффекты которые мешают (оставляем только важные)
      '.subscribe-btn { animation: none !important; }',
      '.subscribe-btn:hover { animation: subscribeGlow 1s infinite !important; }',
      // Текст не должен вылезать за карточку
      '.card h3 { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.9rem !important; }',
      // Лучший placeholder для изображений
      '.card-img:not(:has(img)) { background: linear-gradient(135deg, rgba(14,165,233,0.1), rgba(139,92,246,0.1)) !important; }',
    ].join('\n');
    document.head.appendChild(style);
  }

  // ═══════════════════════════════════════════════════
  // ЗАПУСК ВСЕХ ПАТЧЕЙ
  // ═══════════════════════════════════════════════════
  function runPatches() {
    patchMobileUI();
    applyLazyLoading();

    // Патчи требующие DOM
    var maxAttempts = 20;
    var attempts = 0;
    var patchInterval = setInterval(function() {
      attempts++;
      patchWallpaperUpload();
      patchShareButton();
      injectFirebaseGuide();
      if (attempts >= maxAttempts) clearInterval(patchInterval);
    }, 500);

    // Также патчим при открытии настроек через MutationObserver
    var settingsObserver = new MutationObserver(function() {
      patchWallpaperUpload();
    });
    settingsObserver.observe(document.body, { childList: true, subtree: false });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', runPatches);
  } else {
    runPatches();
  }

  console.log('✅ Panjakent Town v5.1 — патч улучшений загружен');
})();
</script>

/* ═══════════════════════════════════════════════
   PANJAKENT TOWN v5 — NEW FEATURES PATCH
   ═══════════════════════════════════════════════ */

(function() {
  'use strict';

  // ── SPAM FILTER WORDS ──────────────────────────
  var SPAM_WORDS = ['казино','casino','займ','кредит без','ставки','букмекер','18+','xxx','порно','секс услуги','наркотик','heroин','cocaine','мефедрон','амфетамин','купить паспорт','отмывание'];
  
  function containsSpam(text) {
    if (!text) return false;
    var lower = text.toLowerCase();
    return SPAM_WORDS.some(function(w){ return lower.includes(w); });
  }
  
  function sanitizeText(text) {
    if (!text) return text;
    SPAM_WORDS.forEach(function(w){
      var re = new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
      text = text.replace(re, '***');
    });
    return text;
  }

  // ── VERIFIED SELLERS ───────────────────────────
  var verifiedSellers = JSON.parse(localStorage.getItem('pt_verified_sellers') || '[]');
  var verifyApplications = JSON.parse(localStorage.getItem('pt_verify_applications') || '[]');

  function isVerifiedSeller(email) {
    return verifiedSellers.includes(email);
  }
  
  function applyForVerification() {
    if (!window.currentUser) { 
      if (window.showToast) window.showToast('Войдите в аккаунт', true); 
      return; 
    }
    if (isVerifiedSeller(window.currentUser.email)) {
      if (window.showToast) window.showToast('Вы уже верифицированный продавец ✓');
      return;
    }
    var existing = verifyApplications.find(function(a){ return a.email === window.currentUser.email; });
    if (existing) {
      if (window.showToast) window.showToast('Заявка уже отправлена, ожидайте одобрения ⏳');
      return;
    }
    var app = {
      id: Date.now(),
      name: window.currentUser.name,
      email: window.currentUser.email,
      userId: window.currentUser.userId,
      date: new Date().toISOString().split('T')[0],
      status: 'pending'
    };
    verifyApplications.push(app);
    localStorage.setItem('pt_verify_applications', JSON.stringify(verifyApplications));
    
    // Save to Firestore if available
    if (window._firebase && window._firebase.db && window._firebase.auth && window._firebase.auth.app && window._firebase.auth.app.options && window._firebase.auth.app.options.apiKey !== 'YOUR_API_KEY') {
      try {
        window._firebase.addDoc(
          window._firebase.collection(window._firebase.db, 'verify_applications'), app
        ).catch(function(e){ console.warn('Firestore verify app error:', e); });
      } catch(e) {}
    }
    if (window.showToast) window.showToast('Заявка отправлена! Ожидайте одобрения администратора 🎉');
  }
  
  function verifySeller(email) {
    if (!verifiedSellers.includes(email)) {
      verifiedSellers.push(email);
      localStorage.setItem('pt_verified_sellers', JSON.stringify(verifiedSellers));
    }
    // Update application status
    verifyApplications = verifyApplications.map(function(a){
      if (a.email === email) a.status = 'approved';
      return a;
    });
    localStorage.setItem('pt_verify_applications', JSON.stringify(verifyApplications));
    
    if (window.showToast) window.showToast('✅ Продавец верифицирован!');
    renderVerifyApplications();

  function rejectVerification(email) {
    verifyApplications = verifyApplications.map(function(a){
      if (a.email === email) a.status = 'rejected';
      return a;
    });

  // ── REPORTS / ЖАЛОБЫ ──────────────────────────
  var reports = JSON.parse(localStorage.getItem('pt_reports') || '[]');

  function sendReport(itemId, itemTitle, reason) {
    if (!window.currentUser) {
      if (window.showToast) window.showToast('Войдите для отправки жалобы', true);
      return;
    }
    var report = {
      id: Date.now(),
      itemId: itemId,
      itemTitle: itemTitle,
      reason: reason,
      reporterEmail: window.currentUser.email,
      reporterName: window.currentUser.name,
      date: new Date().toISOString(),
      status: 'pending'
    };
    reports.push(report);
    localStorage.setItem('pt_reports', JSON.stringify(reports));
    
    // Save to Firestore
    if (window._firebase && window._firebase.db && window._firebase.auth && window._firebase.auth.app && window._firebase.auth.app.options && window._firebase.auth.app.options.apiKey !== 'YOUR_API_KEY') {
      try {
        window._firebase.addDoc(
          window._firebase.collection(window._firebase.db, 'reports'), report
        ).catch(function(e){ console.warn('Firestore report error:', e); });
      } catch(e) {}
    }
    if (window.showToast) window.showToast('⚠️ Жалоба отправлена администратору');
  }
  
  function showReportModal(itemId, itemTitle) {
    if (!window.currentUser) {
      if (window.showToast) window.showToast('Войдите чтобы пожаловаться', true);
      return;
    }
    var reasons = ['Мошенничество', 'Запрещённый товар', 'Спам / Дубликат', 'Оскорбительный контент', 'Другое'];
    var html = '<div style="margin-bottom:14px;"><strong style="font-size:0.9rem;">Причина жалобы на:<br><span style="color:var(--primary);">'+itemTitle+'</span></strong></div>';
    html += '<div style="display:flex;flex-direction:column;gap:8px;" id="reportReasons">';
    reasons.forEach(function(r, i) {
      html += '<label style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border-radius:14px;cursor:pointer;border:2px solid var(--border);transition:all 0.2s;" class="report-reason-opt" data-idx="'+i+'">'
        + '<input type="radio" name="reportReason" value="'+r+'" style="accent-color:var(--primary);width:16px;height:16px;">'
        + '<span style="font-size:0.88rem;font-weight:600;">'+r+'</span>'
        + '</label>';
    });
    html += '</div>';
    html += '<button class="btn btn-danger" id="submitReportBtn" style="width:100%;margin-top:16px;padding:12px;font-size:0.9rem;border-radius:18px;"><i class="fas fa-flag"></i> Отправить жалобу</button>';
    
    var modal = window.createModal ? window.createModal('⚠️ Пожаловаться', html, null) : null;
    setTimeout(function(){
      // Style radio options
      document.querySelectorAll('.report-reason-opt').forEach(function(opt) {
        opt.addEventListener('click', function() {
          document.querySelectorAll('.report-reason-opt').forEach(function(o){ o.style.borderColor='var(--border)'; o.style.background='var(--bg)'; });
          this.style.borderColor='var(--primary)';
          this.style.background='rgba(14,165,233,0.06)';
          var radio = this.querySelector('input[type=radio]');
          if (radio) radio.checked = true;
        });
      });
      var submitBtn = document.getElementById('submitReportBtn');
      if (submitBtn) {
        submitBtn.addEventListener('click', function(){
          var selected = document.querySelector('input[name="reportReason"]:checked');
          if (!selected) { if(window.showToast) window.showToast('Выберите причину', true); return; }
          sendReport(itemId, itemTitle, selected.value);
          if (modal && modal.remove) modal.remove();
        });
      }
    }, 100);
  }

        { name: 'Мечеть Нур', lat: 39.5000, lng: 67.622, type: 'religion', icon: makeIcon('#f59e0b','🕌'), info: 'Пятничная мечеть' },

        }
      });

    }, 100);
  }

  // Patch Map button and citymap action
  setTimeout(function(){
    var mapBtn = document.getElementById('mapBtn');
    if (mapBtn) {
      // Remove old listeners by cloning
      var newMapBtn = mapBtn.cloneNode(true);
      mapBtn.parentNode.replaceChild(newMapBtn, mapBtn);
      newMapBtn.addEventListener('click', showLeafletMap);
    }

    // Patch showYandexMap
    window.showYandexMap = showLeafletMap;
    window.showCityMapWithMarkers = showLeafletMap;
  }, 500);

  // ── CHAT SPAM FILTER ───────────────────────────
  function patchChatInput() {
    var observer = new MutationObserver(function() {
      var chatInputs = document.querySelectorAll('.chat-input:not([spam-checked])');
      chatInputs.forEach(function(input) {
        input.setAttribute('spam-checked', '1');
        var form = input.closest('form') || input.parentElement;
        var sendBtn = form ? form.querySelector('button[type=submit], .send-btn, #sendMsgBtn, button') : null;
        
        function checkSpamBeforeSend(e) {
          if (containsSpam(input.value)) {
            e.preventDefault();
            e.stopPropagation();
            input.classList.add('input-spam-flag');
            if (window.showToast) window.showToast('⚠️ Сообщение содержит запрещённые слова', true);
            setTimeout(function(){ input.classList.remove('input-spam-flag'); }, 1000);
            return false;
          }
        }
        if (sendBtn) sendBtn.addEventListener('click', checkSpamBeforeSend, true);
      });
    });
    observer.observe(document.body, { childList: true, subtree: true });
  }
  patchChatInput();

  // ── ADD REPORT BUTTON TO ITEM DETAIL PAGE ──────
  function patchItemDetailPage() {
    var observer = new MutationObserver(function() {
      var detailPage = document.getElementById('itemDetailPage');
      if (detailPage && !detailPage.getAttribute('report-patched')) {
        detailPage.setAttribute('report-patched', '1');
        setTimeout(function(){
          // Find action buttons
          var actionsArea = detailPage.querySelector('.card-actions') || detailPage.querySelector('[id*="Action"]') || detailPage.querySelector('.btn-primary')?.parentElement;
          if (actionsArea && !actionsArea.querySelector('.report-btn')) {
            var reportBtn = document.createElement('button');
            reportBtn.className = 'report-btn';
            reportBtn.style.marginTop = '10px';
            reportBtn.innerHTML = '<i class="fas fa-flag"></i> Пожаловаться на объявление';
            reportBtn.style.cssText += 'width:100%;padding:10px 16px;border-radius:16px;font-size:0.8rem;font-weight:700;';
            reportBtn.addEventListener('click', function(){
              // Try to get current item from the page
              var title = detailPage.querySelector('h2,h3')?.textContent || 'Объявление';
              var id = Date.now();
              showReportModal(id, title);
            });
            actionsArea.parentElement.appendChild(reportBtn);
          }
          
          // Add verified badge near seller name if applicable
          var sellerEl = detailPage.querySelector('[id*="seller"], .seller-info, h4');
          if (sellerEl && window._currentDetailItem && isVerifiedSeller(window._currentDetailItem.sellerEmail)) {
            if (!sellerEl.querySelector('.verified-badge')) {
              var badge = document.createElement('span');
              badge.className = 'verified-badge';
              badge.textContent = 'Проверенный продавец';
              badge.style.marginLeft = '8px';
              sellerEl.appendChild(badge);
            }
          }
        }, 300);
      }
    });
    observer.observe(document.body, { childList: true });
  }
  patchItemDetailPage();

  // Track current item being shown
  var origShowItemDetails = window.showItemDetails;
  if (origShowItemDetails) {
    window.showItemDetails = function(item) {
      window._currentDetailItem = item;
      return origShowItemDetails.call(this, item);
    };
  }

  // ── NOTIFICATIONS FIRESTORE SYNC ──────────────
  function syncNotificationsToFirestore() {
    if (!window._firebase || !window._firebase.db) return;
    if (!window._firebase.auth || !window._firebase.auth.app || window._firebase.auth.app.options.apiKey === 'YOUR_API_KEY') return;
    
    // Load notifications from Firestore
    try {
      var notifRef = window._firebase.collection(window._firebase.db, 'notifications');
      var q = window._firebase.query(notifRef, window._firebase.orderBy('timestamp', 'desc'), window._firebase.limit(50));
      window._firebase.onSnapshot(q, function(snapshot) {
        var notifs = [];
        snapshot.forEach(function(doc){ notifs.push({ ...doc.data(), firestoreId: doc.id }); });
        if (notifs.length > 0 && window._onNotificationsLoaded) window._onNotificationsLoaded(notifs);
        // Update badge
        var unread = notifs.filter(function(n){ return !n.read; }).length;
        var badge = document.getElementById('notifBadge');
        if (badge && unread > 0) { badge.textContent = unread; badge.style.display = ''; }
      });
    } catch(e) { console.warn('Firestore notifications sync error:', e); }
  }
  setTimeout(syncNotificationsToFirestore, 2000);

  // ── AUCTION FIRESTORE SYNC ─────────────────────
  function syncAuctionsFromFirestore() {
    if (!window._firebase || !window._firebase.db) return;
    if (!window._firebase.auth || !window._firebase.auth.app || window._firebase.auth.app.options.apiKey === 'YOUR_API_KEY') return;
    try {
      var q = window._firebase.query(
        window._firebase.collection(window._firebase.db, 'auctions'),
        window._firebase.orderBy('timestamp', 'desc'),
        window._firebase.limit(30)
      );
      window._firebase.getDocs(q).then(function(snapshot) {
        var items = [];
        snapshot.forEach(function(doc){ items.push({ ...doc.data(), firestoreId: doc.id }); });
        if (items.length > 0 && window.auctions !== undefined) {
          window.auctions = items.concat(window.auctions || []);
        }
      }).catch(function(e){ console.warn('Firestore auctions sync:', e); });
    } catch(e) {}
  }
  setTimeout(syncAuctionsFromFirestore, 1500);

  // ── NEWS FIRESTORE SYNC ───────────────────────
  function syncNewsFromFirestore() {
    if (!window._firebase || !window._firebase.db) return;
    if (!window._firebase.auth || !window._firebase.auth.app || window._firebase.auth.app.options.apiKey === 'YOUR_API_KEY') return;
    try {
      var q = window._firebase.query(
        window._firebase.collection(window._firebase.db, 'news'),
        window._firebase.orderBy('timestamp', 'desc'),
        window._firebase.limit(20)
      );
      window._firebase.getDocs(q).then(function(snapshot) {
        var items = [];
        snapshot.forEach(function(doc){ items.push({ ...doc.data(), firestoreId: doc.id }); });
        if (items.length > 0 && window.blogPosts !== undefined) {
          window.blogPosts = items.concat(window.blogPosts || []);
        }
      }).catch(function(e){ console.warn('Firestore news sync:', e); });
    } catch(e) {}
  }
  setTimeout(syncNewsFromFirestore, 1800);

  // ── MFP CARDS: add verify option ─────────────
  var mfpObserver = new MutationObserver(function() {
    var page = document.getElementById('moreFeaturesPage');
    if (page && !page.getAttribute('v5-patched')) {
      page.setAttribute('v5-patched', '1');
      // Add glass class to mfp header
      var header = page.querySelector('.mfp-header, div:first-child');
      if (header) {
        header.style.backdropFilter = 'blur(30px) saturate(200%)';
      }
      // Patch all mfp-cards with glass-reveal
      page.querySelectorAll('.mfp-card').forEach(function(card, i) {
        card.classList.add('glass-reveal');
        card.style.animationDelay = (i * 0.05) + 's';
      });
      // Add verify card if not exists
      var grid = page.querySelector('.mfp-card')?.parentElement;
      if (grid && !grid.querySelector('[data-action="verify"]')) {
        var vCard = document.createElement('div');
        vCard.className = 'mfp-card glass-reveal';
        vCard.setAttribute('data-action', 'verify');
        vCard.style.cssText = 'cursor:pointer;padding:18px;border-radius:20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;';
        vCard.style.animationDelay = (grid.children.length * 0.05) + 's';
        vCard.innerHTML = '<div style="font-size:2rem;width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,#007AFF,#5AC8FA);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,122,255,0.35);">✅</div><div style="font-weight:700;font-size:0.85rem;letter-spacing:-0.01em;">Верификация</div><div style="font-size:0.72rem;color:var(--text-secondary);">Подтвердить магазин</div>';
        vCard.addEventListener('click', function(){
          page.remove();
          applyForVerification();
        });
        grid.appendChild(vCard);
      }
    }
  });
  mfpObserver.observe(document.body, { childList: true });

  console.log('🚀 Panjakent Town v5.0 — iOS 26 Liquid Glass + Leaflet Map + Reports + Verification!');

})();
</script>
