  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, deleteDoc, updateDoc, onSnapshot, serverTimestamp, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ⚠️ ЗАМЕНИТЕ на ваши данные из Firebase Console:
    // https://console.firebase.google.com → Ваш проект → Настройки → Веб-приложение
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Экспортируем в глобальный объект для доступа из основного скрипта
    window._firebase = { auth, db, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, doc, setDoc, getDoc, collection, addDoc, getDocs, deleteDoc, updateDoc, onSnapshot, serverTimestamp, query, orderBy, limit };

    // Слушаем состояние авторизации
    onAuthStateChanged(auth, async (firebaseUser) => {
      if (firebaseUser) {
        try {
          const userDoc = await getDoc(doc(db, "users", firebaseUser.uid));
          if (userDoc.exists()) {
            const userData = userDoc.data();
            window._fbUser = { ...userData, firebaseUid: firebaseUser.uid };
            if (window._onFirebaseAuth) window._onFirebaseAuth(window._fbUser);
          }
        } catch(e) {
          console.error("Ошибка загрузки пользователя:", e);
        }
      } else {
        window._fbUser = null;
        if (window._onFirebaseAuth) window._onFirebaseAuth(null);
      }
    });

    // Загрузка объявлений из Firestore при старте
    async function loadMarketplaceFromFirestore() {
      try {
        const q = query(collection(db, "marketplace"), orderBy("timestamp", "desc"), limit(100));
        const snapshot = await getDocs(q);
        const items = [];
        snapshot.forEach(docSnap => {
          items.push({ ...docSnap.data(), firestoreId: docSnap.id });
        });
        if (items.length > 0 && window._onMarketplaceLoaded) {
          window._onMarketplaceLoaded(items);
        }
      } catch(e) {
        console.warn("Firestore не настроен или нет доступа, используется локальный режим:", e.message);
      }
    }
    loadMarketplaceFromFirestore();
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    :root {
      --primary: #0ea5e9;
      --primary-dark: #0284c7;
      --primary-light: #38bdf8;
      --bg: #f8fafc;
      --surface: rgba(255, 255, 255, 0.95);
      --text: #0f172a;
      --text-secondary: #475569;
      --border: #e2e8f0;
      --shadow: 0 8px 30px rgba(0,0,0,0.05);
      --shadow-lg: 0 20px 40px rgba(0,0,0,0.1);
      --shadow-xl: 0 25px 50px rgba(0,0,0,0.15);
      --radius: 20px;
      --radius-lg: 30px;
      --favorite: #ef4444;
      --gold: #f59e0b;
      --green: #10b981;
      --danger: #ef4444;
      --purple: #8b5cf6;
      --pink: #ec4899;
      --indigo: #6366f1;
      --like-color: #ef4444;
      --comment-color: #3b82f6;
      --subscribe-color: #8b5cf6;
    }
    body.dark {
      --bg: #0b1120;
      --surface: rgba(30, 41, 59, 0.95);
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --border: #334155;
      --shadow: 0 8px 30px rgba(0,0,0,0.3);
      --shadow-lg: 0 20px 40px rgba(0,0,0,0.4);
      --shadow-xl: 0 25px 50px rgba(0,0,0,0.5);
    }
    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: all 0.3s;
      padding-bottom: 65px;
    }
    
    /* НОВЫЕ АНИМАЦИИ */
    @keyframes homeGlow {
      0%, 100% { box-shadow: 0 0 5px rgba(14,165,233,0.3); }
      50% { box-shadow: 0 0 20px rgba(14,165,233,0.6), 0 0 40px rgba(14,165,233,0.3); }
    }
    @keyframes chatsPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); color: #8b5cf6; }
    }
    @keyframes addRotate {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(10deg); }
      75% { transform: rotate(-10deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes notifBell {
      0%, 100% { transform: rotate(0); }
      10% { transform: rotate(15deg); }
      20% { transform: rotate(-15deg); }
      30% { transform: rotate(10deg); }
      40% { transform: rotate(-10deg); }
      50% { transform: rotate(0); }
    }
    @keyframes profileShine {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.3); color: #f59e0b; }
      100% { filter: brightness(1); }
    }
    @keyframes likeAnimation {
      0% { transform: scale(1); }
      25% { transform: scale(1.3); }
      50% { transform: scale(0.9); }
      75% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    @keyframes subscribeGlow {
      0%, 100% { box-shadow: 0 0 5px rgba(139,92,246,0.3); }
      50% { box-shadow: 0 0 15px rgba(139,92,246,0.8); }
    }
    @keyframes commentSlide {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes floatNotification {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    @keyframes rippleEffect {
      0% { box-shadow: 0 0 0 0 rgba(14,165,233,0.4); }
      100% { box-shadow: 0 0 0 20px rgba(14,165,233,0); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes shimmer {
      0% { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }
    
    /* SKELETON LOADER */
    .skeleton-card {
      background: linear-gradient(90deg, var(--border) 25%, var(--surface) 50%, var(--border) 75%);
      background-size: 1000px 100%;
      animation: shimmer 2s infinite;
      border-radius: var(--radius);
      height: 280px;
    }
    
    /* Обои */
    body.wallpaper-1 { background-image: url('https://images.pexels.com/photos/417074/pexels-photo-417074.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2'); background-size: cover; background-attachment: fixed; }
    body.wallpaper-2 { background-image: url('https://images.pexels.com/photos/531880/pexels-photo-531880.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2'); background-size: cover; background-attachment: fixed; }
    body.wallpaper-3 { background-image: url('https://images.pexels.com/photos/1103970/pexels-photo-1103970.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2'); background-size: cover; background-attachment: fixed; }
    body.wallpaper-4 { background-image: url('https://images.pexels.com/photos/1037992/pexels-photo-1037992.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2'); background-size: cover; background-attachment: fixed; }
    body.wallpaper-5 { background-image: url('https://images.pexels.com/photos/3601097/pexels-photo-3601097.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2'); background-size: cover; background-attachment: fixed; }
    body.wallpaper-6 { background-image: url('https://images.pexels.com/photos/4881669/pexels-photo-4881669.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2'); background-size: cover; background-attachment: fixed; }
    body.wallpaper-7 { background-image: url('https://images.pexels.com/photos/1216589/pexels-photo-1216589.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2'); background-size: cover; background-attachment: fixed; }
    body.wallpaper-8 { background-image: url('https://images.pexels.com/photos/3584979/pexels-photo-3584979.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2'); background-size: cover; background-attachment: fixed; }
    
    body.wallpaper-custom { background-size: cover; background-attachment: fixed; background-position: center; }
    
    .container { max-width: 1200px; margin: 0 auto; padding: 0 16px; }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 0; flex-wrap: wrap; gap: 10px;
      position: sticky; top: 0; background: var(--bg); z-index: 50; backdrop-filter: blur(12px);
    }
    .logo {
      font-size: 1.5rem; font-weight: 800;
      background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer;
      transition: transform 0.3s;
    }
    .logo:hover { transform: scale(1.05); }
    .header-btns { display: flex; gap: 5px; flex-wrap: wrap; }
    .widget-bar {
      display: flex; gap: 15px; background: var(--surface); padding: 8px 15px; border-radius: 30px; margin-bottom: 10px; justify-content: space-between; flex-wrap: wrap; border: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }
    .btn {
      padding: 7px 11px; border-radius: 25px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-weight: 500; cursor: pointer;
      display: flex; align-items: center; gap: 4px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-size: 0.75rem; white-space: nowrap;
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }
    .btn:hover::before { width: 300px; height: 300px; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; }
    .btn-danger { background: linear-gradient(135deg, var(--danger), #b91c1c); color: white; border: none; }
    .btn-green { background: linear-gradient(135deg, var(--green), #059669); color: white; border: none; }
    .btn-purple { background: linear-gradient(135deg, var(--purple), #6d28d9); color: white; border: none; }
    .btn-warning { background: linear-gradient(135deg, var(--gold), #d97706); color: white; border: none; }
    .btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); opacity: 1; }
    .search-bar {
      display: flex; background: var(--surface); border-radius: 35px;
      padding: 5px 5px 5px 16px; margin: 12px 0; border: 1px solid var(--border); box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    .search-bar:focus-within { box-shadow: 0 0 0 3px rgba(14,165,233,0.2); transform: scale(1.01); }
    .search-bar input { flex: 1; border: none; background: transparent; padding: 10px 0; outline: none; color: var(--text); font-size: 0.9rem; }
    .search-bar button { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; color: white; padding: 8px 20px; border-radius: 25px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .search-bar button:hover { transform: scale(1.05); }
    .voice-search-btn { background: linear-gradient(135deg, var(--purple), #6d28d9); border: none; color: white; padding: 8px 15px; border-radius: 25px; cursor: pointer; margin-left: 5px; transition: all 0.3s; }
    .voice-search-btn:hover { transform: scale(1.05); animation: pulse 0.5s; }
    .categories { display: flex; gap: 8px; overflow-x: auto; padding: 6px 0 16px; scrollbar-width: thin; }
    .cat { background: var(--surface); border: 1px solid var(--border); padding: 6px 16px; border-radius: 18px; white-space: nowrap; cursor: pointer; font-weight: 500; font-size: 0.85rem; transition: all 0.3s; }
    .cat:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .cat.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border-color: transparent; }
    .section-title { font-size: 1.3rem; font-weight: 700; margin: 18px 0 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 20px; }
    .card {
      background: var(--surface); border-radius: var(--radius); padding: 12px;
      border: 1px solid var(--border); box-shadow: var(--shadow); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; position: relative;
      animation: fadeInUp 0.5s ease;
      backdrop-filter: blur(10px);
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .card:hover { transform: translateY(-8px) scale(1.02); box-shadow: var(--shadow-xl); }
    .card-img {
      height: 150px; background: linear-gradient(135deg, #e0e7ff, #c7d2fe); border-radius: 12px;
      display: flex; align-items: center; justify-content: center; font-size: 3rem; margin-bottom: 8px; overflow: hidden; position: relative;
    }
    .card-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; transition: transform 0.5s; }
    .card:hover .card-img img { transform: scale(1.05); }
    .online-status { position: absolute; bottom: 5px; right: 5px; width: 12px; height: 12px; border-radius: 50%; background: #4CAF50; border: 2px solid white; z-index: 10; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(76,175,80,0.7); } 70% { box-shadow: 0 0 0 6px rgba(76,175,80,0); } 100% { box-shadow: 0 0 0 0 rgba(76,175,80,0); } }
    .online-status.offline { background: #9e9e9e; animation: none; }
    .photo-nav { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); display: flex; gap: 3px; z-index: 5; }
    .photo-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.3s; }
    .photo-dot.active { background: white; transform: scale(1.2); }
    .photo-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; width: 26px; height: 26px; border-radius: 50%; cursor: pointer; z-index: 5; font-size: 0.8rem; transition: all 0.3s; }
    .photo-arrow:hover { background: rgba(0,0,0,0.8); transform: translateY(-50%) scale(1.1); }
    .photo-arrow.left { left: 6px; }
    .photo-arrow.right { right: 6px; }
    .price { font-weight: 700; color: var(--primary); margin: 3px 0; font-size: 0.95rem; }
    .card-actions { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
    .card-actions button { flex: 1; min-width: 40px; padding: 6px 5px; border-radius: 18px; font-weight: 600; cursor: pointer; border: none; font-size: 0.7rem; transition: all 0.3s; }
    .card-actions button:hover { transform: translateY(-2px); }
    .level-badge { position: absolute; top: 10px; left: 10px; background: linear-gradient(135deg, var(--gold), #d97706); color: white; padding: 3px 8px; border-radius: 20px; font-size: 0.65rem; font-weight: bold; z-index: 10; animation: glow 2s ease-in-out infinite alternate; }
    @keyframes glow { from { box-shadow: 0 0 2px var(--gold); } to { box-shadow: 0 0 10px var(--gold); } }
    
    /* ЭМОДЗИ РЕАКЦИИ */
    .reactions-container {
      display: flex;
      gap: 5px;
      margin-top: 8px;
    }
    .reaction-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 4px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .reaction-btn:hover {
      transform: scale(1.1);
      background: var(--primary);
      color: white;
    }
    .reaction-count {
      margin-left: 3px;
      font-size: 0.7rem;
    }
    
    .like-btn {
      transition: all 0.3s;
    }
    .like-btn.liked {
      animation: likeAnimation 0.5s ease;
      color: var(--like-color) !important;
    }
    .like-count {
      font-size: 0.7rem;
      font-weight: bold;
      margin-left: 2px;
    }
    .comment-btn {
      transition: all 0.3s;
    }
    .comment-btn:hover {
      color: var(--comment-color) !important;
    }
    
    .subscribe-btn {
      background: linear-gradient(135deg, var(--purple), #6d28d9);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    .subscribe-btn.subscribed {
      background: linear-gradient(135deg, #64748b, #475569);
    }
    .subscribe-btn:hover {
      transform: scale(1.05);
      animation: subscribeGlow 1s infinite;
    }
    
    .notification-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: var(--danger);
      color: white;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 0.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      /* floatNotification убран — не нужна постоянная анимация на бейдже */
    }
    
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(6px); animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal.active { display: flex; }
    .modal-content {
      background: var(--surface); border-radius: var(--radius-lg); padding: 20px; max-width: 800px; width: 95%;
      box-shadow: var(--shadow-xl); color: var(--text); max-height: 85vh; overflow-y: auto;
      animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-50px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .modal-content h2 { margin-bottom: 14px; text-align: center; font-size: 1.2rem; background: linear-gradient(135deg, var(--primary), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .modal-content input, .modal-content select, .modal-content textarea {
      width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px;
      border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.9rem;
      transition: all 0.3s;
    }
    .modal-content input:focus, .modal-content select:focus, .modal-content textarea:focus {
      outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(14,165,233,0.2);
    }
    .settings-group { margin-bottom: 20px; padding: 10px; border: 1px solid var(--border); border-radius: 12px; transition: all 0.3s; }
    .settings-group:hover { box-shadow: var(--shadow); }
    .settings-group h4 { margin-bottom: 10px; font-size: 1rem; color: var(--primary); }
    .wallpaper-options { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .wallpaper-option { width: 60px; height: 60px; border-radius: 12px; cursor: pointer; border: 2px solid transparent; background-size: cover; transition: all 0.3s; }
    .wallpaper-option:hover { transform: scale(1.1); }
    .wallpaper-option.active { border-color: var(--primary); transform: scale(1.05); box-shadow: 0 0 15px var(--primary); }
    .wallpaper-default { background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    .chat-messages { background: var(--bg); padding: 12px; border-radius: 10px; min-height: 400px; max-height: 500px; overflow-y: auto; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; }
    .chat-msg { max-width: 75%; padding: 10px 14px; border-radius: 18px; word-wrap: break-word; font-size: 0.9rem; position: relative; animation: messageSlide 0.3s ease; }
    @keyframes messageSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .chat-msg.sent { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .chat-msg.received { background: #e5e7eb; color: #1f2937; align-self: flex-start; border-bottom-left-radius: 4px; }
    body.dark .chat-msg.received { background: #334155; color: #f1f5f9; }
    .chat-msg .msg-time { font-size: 0.65rem; opacity: 0.7; margin-top: 4px; display: flex; justify-content: flex-end; gap: 4px; }
    .chat-msg img { max-width: 200px; max-height: 150px; border-radius: 10px; margin-top: 5px; cursor: pointer; transition: transform 0.3s; }
    .chat-msg img:hover { transform: scale(1.05); }
    .chat-msg .read-status {
      font-size: 0.6rem;

      font-weight: 600 !important;
      transition: all 0.3s var(--transition-spring) !important;
    }
    .admin-tab:hover {
      background: rgba(14,165,233,0.1) !important;
    }
    .admin-tab.active {
      box-shadow: 0 4px 15px rgba(14,165,233,0.3) !important;
    }
    .stat-card {
      transition: all 0.4s var(--transition-spring) !important;
      border: 1px solid var(--border) !important;
    }
    .stat-card:hover {
      transform: translateY(-6px) scale(1.02) !important;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08) !important;
      border-color: rgba(14,165,233,0.3) !important;
    }
    .stat-card .number {
      font-family: 'Syne', sans-serif !important;
      font-size: 1.8rem !important;
    }

    /* ===================== BLOG POST ===================== */
    .blog-post {
      border: 1px solid rgba(255,255,255,0.3) !important;
      backdrop-filter: blur(10px) !important;
      transition: all 0.4s var(--transition-spring) !important;
    }
    body.dark .blog-post {
      border: 1px solid rgba(255,255,255,0.06) !important;
    }
    .blog-post:hover {
      transform: translateY(-5px) !important;
      box-shadow: 0 15px 40px rgba(0,0,0,0.1), 0 0 0 1px rgba(14,165,233,0.15) !important;
    }

    /* ===================== LEADERBOARD ===================== */
    .leaderboard-item {
      border: 1px solid transparent !important;
      transition: all 0.3s var(--transition-spring) !important;
    }
    .leaderboard-item:hover {
      border-color: rgba(14,165,233,0.2) !important;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06) !important;
      transform: translateX(8px) translateY(-2px) !important;
    }
    .leaderboard-rank.gold { 
      text-shadow: 0 0 15px rgba(255,215,0,0.8) !important;
      animation: pt-goldGlow 2s infinite !important;
    }
    @keyframes pt-goldGlow {
      0%, 100% { text-shadow: 0 0 10px rgba(255,215,0,0.6); }
      50% { text-shadow: 0 0 25px rgba(255,215,0,1), 0 0 50px rgba(255,215,0,0.4); }
    }
    .leaderboard-avatar {
      background: linear-gradient(135deg, var(--primary), var(--purple)) !important;
      box-shadow: 0 4px 15px rgba(14,165,233,0.3) !important;
    }

    /* ===================== AUCTION STYLES ===================== */
    .auction-timer {
      font-family: 'Syne', monospace !important;
      font-size: 1.2rem !important;
      font-weight: 800 !important;
      text-shadow: 0 0 10px rgba(239,68,68,0.5) !important;
    }

    /* ===================== REFERRAL BOX ===================== */
    .referral-box {
      background: linear-gradient(135deg, var(--primary) 0%, var(--indigo) 50%, var(--purple) 100%) !important;
      box-shadow: 0 10px 40px rgba(14,165,233,0.3) !important;
      position: relative;
      overflow: hidden;
    }
    .referral-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
      animation: pt-refShine 3s infinite;
    }
    @keyframes pt-refShine {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .referral-code {
      font-family: 'JetBrains Mono', monospace !important;
      letter-spacing: 6px !important;
      font-weight: 900 !important;
    }

    /* ===================== SCROLL ENHANCEMENTS ===================== */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(14,165,233,0.3); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(14,165,233,0.6); }

    /* ===================== SMOOTH SCROLL ===================== */

    /* ===================== BARTER CARD ===================== */

      transition: all 0.4s var(--transition-spring) !important;

    .barter-card:hover {
      transform: translateY(-4px) !important;
      border-color: var(--primary) !important;
      box-shadow: 0 8px 25px rgba(14,165,233,0.15) !important;
    }

    /* ===================== PWA BANNER ===================== */
    .pwa-banner {
      border: 1px solid rgba(255,255,255,0.2) !important;
      backdrop-filter: blur(20px) !important;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3) !important;
    }

    /* ===================== ANALYTICS BARS ===================== */
    .analytics-bar {
      transition: height 0.8s var(--transition-spring) !important;
      box-shadow: 0 -4px 10px rgba(14,165,233,0.3) !important;
    }

    /* ===================== SUBSCRIBE BUTTON ===================== */
    .subscribe-btn {
      box-shadow: 0 4px 15px rgba(139,92,246,0.3) !important;
      transition: all 0.3s var(--transition-spring) !important;
    }
    .subscribe-btn:hover {
      box-shadow: var(--glow-purple) !important;
      transform: scale(1.06) !important;
    }

    /* ===================== FAVORITE CARDS ===================== */
    .favorite-card {
      backdrop-filter: blur(10px) !important;
      transition: all 0.4s var(--transition-spring) !important;
    }
    .favorite-card:hover {
      transform: translateY(-8px) scale(1.01) !important;
      box-shadow: 0 20px 50px rgba(0,0,0,0.12) !important;
    }

    /* ===================== SETTINGS GROUPS ===================== */
    .settings-group {
      transition: all 0.3s var(--transition-spring) !important;
    }
    .settings-group:hover {
      box-shadow: 0 6px 20px rgba(0,0,0,0.06), 0 0 0 1px rgba(14,165,233,0.1) !important;
      transform: translateY(-1px) !important;
    }
    .wallpaper-option {
      transition: all 0.4s var(--transition-spring) !important;
    }
    .wallpaper-option:hover {
      transform: scale(1.12) translateY(-2px) !important;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2) !important;
    }

    /* ===================== NOTIFICATION ITEMS ===================== */
    .notification-item {
      transition: all 0.3s var(--transition-spring) !important;
      backdrop-filter: blur(10px) !important;
    }
    .notification-item:hover {
      transform: translateX(8px) translateY(-2px) !important;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08) !important;
    }
    .notification-item.unread {
      box-shadow: 0 4px 15px rgba(14,165,233,0.1), inset 3px 0 0 var(--primary) !important;
      border-left: none !important;
    }

    /* ===================== CHAT ITEMS ===================== */
    .chat-item {
      backdrop-filter: blur(10px) !important;
      transition: all 0.3s var(--transition-spring) !important;
    }
    .chat-item:hover {
      transform: translateX(8px) translateY(-2px) !important;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08) !important;
      border-color: rgba(14,165,233,0.2) !important;
    }

    /* ===================== INPUT FOCUS STATES ===================== */
    .modal-content input:focus,
    .modal-content select:focus,
    .modal-content textarea:focus {
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 3px rgba(14,165,233,0.15), 0 4px 15px rgba(14,165,233,0.1) !important;
      transform: translateY(-1px) !important;
    }
    .auth-input:focus {
      transform: translateY(-2px) scale(1.01) !important;
      box-shadow: 0 0 0 3px rgba(14,165,233,0.15), 0 8px 25px rgba(14,165,233,0.15) !important;
    }

    /* ===================== PAGE TRANSITION ===================== */
    .pt-page-enter {
      animation: pt-pageIn 0.5s var(--transition-spring) both;
    }
    @keyframes pt-pageIn {
      from { opacity:0; transform: translateY(20px); }
      to { opacity:1; transform: translateY(0); }
    }

    /* ===================== CARD STAGGER ANIMATION ===================== */
    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.10s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.20s; }
    .card:nth-child(5) { animation-delay: 0.25s; }
    .card:nth-child(6) { animation-delay: 0.30s; }
    .card:nth-child(7) { animation-delay: 0.35s; }
    .card:nth-child(8) { animation-delay: 0.40s; }

    /* ===================== MOBILE OPTIMIZATIONS ===================== */
    @media (max-width: 640px) {
      .logo { font-size: 1.3rem !important; }
      .header-btns { gap: 3px !important; }
      .btn { padding: 6px 9px !important; font-size: 0.7rem !important; }
      .card:hover { transform: translateY(-4px) scale(1.01) !important; }
      .nav-item { padding: 5px 8px !important; }
      .section-title { font-size: 1.2rem !important; }
      .modal-content { width: 98% !important; border-radius: 20px !important; max-height: 90vh !important; }
    }
    @media (max-width: 380px) {
      .header-btns { gap: 2px !important; }
      .btn { padding: 5px 7px !important; font-size: 0.65rem !important; }
    }

    /* ===================== DARK MODE ENHANCED ===================== */
    body.dark .card {
      box-shadow: 0 4px 24px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04) !important;
    }
    body.dark .search-bar {
      background: rgba(30,41,59,0.9) !important;
      border-color: rgba(255,255,255,0.1) !important;
    }
    body.dark .modal-content h2 {
      background: linear-gradient(135deg, var(--primary-light), var(--purple)) !important;
      -webkit-background-clip: text !important;
      -webkit-text-fill-color: transparent !important;
    }
    body.dark .stat-card:hover {
      box-shadow: 0 12px 30px rgba(0,0,0,0.3), 0 0 15px rgba(14,165,233,0.1) !important;
    }

    /* ===================== GLOW EFFECTS FOR SPECIAL ELEMENTS ===================== */
    .btn-primary.nav-active,
    .nav-item.active .fa-home { color: var(--primary); filter: drop-shadow(0 0 8px rgba(14,165,233,0.6)); }
    
    /* Progress bar XP */
    .xp-bar-fill { 
      background: linear-gradient(90deg, var(--primary), var(--purple), var(--pink)) !important;
      box-shadow: 0 0 10px rgba(14,165,233,0.4) !important;
      background-size: 200% 100%;
      animation: pt-xpShimmer 2s linear infinite;
    }
    @keyframes pt-xpShimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    /* ===================== PHOTO ARROWS ===================== */
    .photo-arrow {
      backdrop-filter: blur(8px) !important;
      background: rgba(0,0,0,0.4) !important;
      border: 1px solid rgba(255,255,255,0.2) !important;
      transition: all 0.3s var(--transition-spring) !important;
    }
    .photo-arrow:hover {
      background: rgba(14,165,233,0.7) !important;
      transform: translateY(-50%) scale(1.15) !important;
    }

    /* ===================== BACK BUTTON ===================== */
    .back-btn:hover {
      transform: translateX(-5px) scale(1.1) !important;
      color: var(--primary) !important;
    }

    /* ===================== REVIEW ITEMS ===================== */
    .review-item {
      transition: all 0.3s var(--transition-spring) !important;
    }
    .review-item:hover {
      transform: translateX(8px) !important;
      box-shadow: 4px 0 15px rgba(245,158,11,0.2) !important;
    }

    /* ===================== HISTORY ITEMS ===================== */
    .history-item:hover {
      background: rgba(14,165,233,0.06) !important;
      transform: translateX(8px) !important;
    }

    /* ===================== CONTAINER ===================== */
    .container { position: relative; z-index: 1; }

    /* ===================== MORE FEATURES NAV SPECIAL ===================== */
    #moreFeaturesNav {
      background: linear-gradient(135deg, rgba(139,92,246,0.12), rgba(236,72,153,0.12)) !important;
    }
    #moreFeaturesNav i {
      background: linear-gradient(135deg, var(--purple), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #moreFeaturesNav.active, #moreFeaturesNav:hover {
      background: linear-gradient(135deg, rgba(139,92,246,0.22), rgba(236,72,153,0.22)) !important;
      box-shadow: 0 4px 15px rgba(139,92,246,0.2) !important;
    }
    /* Adjust bottom-nav for 6 items */
    .bottom-nav { padding-left: 2px !important; padding-right: 2px !important; }
    .nav-item { padding: 5px 6px !important; }
    .nav-item span { font-size: 0.6rem !important; }
    .nav-item i { font-size: 1.2rem !important; }

    /* ===================== ITEM DETAIL PAGE STYLES ===================== */
    #itemDetailPage input { outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    #itemDetailPage input:focus { border-color: var(--primary) !important; box-shadow: 0 0 0 3px rgba(14,165,233,0.15) !important; }
    
    /* ===================== MORE FEATURES PAGE ===================== */
    #moreFeaturesPage .mfp-card:active { transform: scale(0.97) !important; }

  

    /* ===================== SAFE AREA ===================== */
    .bottom-nav {
      padding-bottom: max(14px, env(safe-area-inset-bottom)) !important;
    }
    body {
      padding-bottom: max(65px, calc(65px + env(safe-area-inset-bottom))) !important;
    }
    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)) !important; gap: 10px !important; }
    }
    @media (min-width: 1024px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)) !important; }
    }
    @media (min-width: 1440px) {
      .container { max-width: 1400px !important; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)) !important; }
    }

    /* ===================== ANIMATED COUNTERS ===================== */
    .stat-card .number, .leaderboard-score { 
      transition: all 0.5s var(--transition-spring);
    }

    /* ===================== COMMENT SECTION ===================== */
    .comment-item {
      border-left: 3px solid transparent !important;
      background: linear-gradient(var(--bg), var(--bg)) padding-box,
                  linear-gradient(135deg, var(--primary), var(--purple)) border-box !important;
      border: 1px solid transparent !important;
      border-left: 3px solid var(--comment-color) !important;
      transition: all 0.3s var(--transition-spring) !important;
    }
    .comment-item:hover {
      transform: translateX(4px) !important;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06) !important;
    }

    /* ===================== LIKE BTN ===================== */
    .like-btn:hover { transform: scale(1.2) !important; }
    .like-btn.liked { 
      filter: drop-shadow(0 0 6px rgba(239,68,68,0.6)) !important;
    }

    /* ===================== ROLE BADGES ===================== */
    .role-badge.admin {
      box-shadow: 0 0 10px rgba(139,92,246,0.4) !important;
    }

    /* ===================== QUICK REPLY ===================== */
    .quick-reply {
      transition: all 0.25s var(--transition-spring) !important;
    }
    .quick-reply:hover {
      transform: translateY(-2px) scale(1.05) !important;
      box-shadow: 0 4px 12px rgba(14,165,233,0.2) !important;
    }

    /* ===================== FILE UPLOAD ===================== */
    .file-upload {
      transition: all 0.3s var(--transition-spring) !important;
    }
    .file-upload:hover {
      border-color: var(--primary) !important;
      background: rgba(14,165,233,0.04) !important;
      transform: scale(1.01) !important;
      box-shadow: 0 0 0 3px rgba(14,165,233,0.1) !important;
    }

    /* ===================== PREMIUM LOADING STATE ===================== */
    .pt-loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      animation: pt-loaderFadeOut 0.5s ease 1.2s both;
    }
    @keyframes pt-loaderFadeOut {
      to { opacity: 0; pointer-events: none; }
    }
    .pt-loader-logo {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #0ea5e9, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: pt-logoBreath 1s ease-in-out infinite alternate;
    }
    @keyframes pt-logoBreath {
      from { transform: scale(0.97); filter: brightness(0.9); }
      to { transform: scale(1.03); filter: brightness(1.1); }
    }
    .pt-loader-bar {
      width: 200px;
      height: 3px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .pt-loader-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--purple));
      border-radius: 3px;
      animation: pt-loaderFill 1s ease both;
      box-shadow: 0 0 10px rgba(14,165,233,0.5);
    }
    @keyframes pt-loaderFill {
      from { width: 0; }
      to { width: 100%; }
    }

    /* ===================== WALLPAPER OVERLAY ===================== */
    body[class*="wallpaper-"]::after {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      pointer-events: none;
      z-index: 0;
    }
  
    /* ==================== FULL PROFILE PAGE ==================== */
    #profileFullPage { font-family: 'Inter', sans-serif; }
    #profileFullPage .prof-tab { transition: all 0.2s; }
    #profileFullPage .prof-tab:hover { color: var(--primary) !important; }
    #profileFullPage button { transition: all 0.2s; }
    #profileFullPage button:hover { opacity: 0.9; transform: translateY(-1px); }
    #profileFullPage input:focus, #profileFullPage textarea:focus {
      outline: none; border-color: var(--primary) !important;
      box-shadow: 0 0 0 3px rgba(14,165,233,0.15);
    }
    .sub-inner-tab { transition: all 0.2s !important; }

  </style>
</head>

      function updateUILanguage() {
        // Translate all data-i18n elements
        document.querySelectorAll('[data-i18n]').forEach(function(el) {
          var key = el.getAttribute('data-i18n');
          var val = t(key);
          if(val && val !== key) el.textContent = val;
        });
        // Bottom nav
        var homeNav = document.getElementById('homeNav'); if(homeNav) homeNav.querySelector('span').textContent = t('main');
        var chatsNav = document.getElementById('chatsNav'); if(chatsNav) chatsNav.querySelector('span').textContent = t('chats');
        var addNav = document.getElementById('addListingNav'); if(addNav) addNav.querySelector('span').textContent = t('add');
        var notifNav = document.getElementById('notifNav'); if(notifNav) notifNav.querySelector('span').textContent = t('notifications');
        var profileNav = document.getElementById('profileNav'); if(profileNav) profileNav.querySelector('span').textContent = t('profile');
        // Header buttons
        var searchBtn = document.getElementById('searchButton'); if(searchBtn) searchBtn.textContent = t('find');
        var searchInput = document.getElementById('searchInput'); if(searchInput) searchInput.placeholder = t('search');
        var loginBtn = document.getElementById('loginBtn'); if(loginBtn && loginBtn.style.display !== 'none') loginBtn.innerHTML = '<i class="fas fa-user"></i> ' + t('login');
        var logoutBtn = document.getElementById('logoutBtn'); if(logoutBtn) logoutBtn.innerHTML = '<i class="fas fa-sign-out-alt"></i> ' + t('logout');
        var mapBtn = document.getElementById('mapBtn'); if(mapBtn) mapBtn.innerHTML = '<i class="fas fa-map-marked-alt"></i> ' + t('map');
        // Handle placeholder translations
        document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el){ var key=el.getAttribute('data-i18n-placeholder'); var val=t(key); if(val&&val!==key) el.placeholder=val; });
        var settingsBtn = document.getElementById('settingsBtn'); if(settingsBtn) settingsBtn.title = t('settings');
        // Quick bar buttons - translate spans
        var quickBarSpans = document.querySelectorAll('#quickBar span[data-i18n]');
        quickBarSpans.forEach(function(sp) {
          var key = sp.getAttribute('data-i18n');
          var val = t(key);
          if(val && val !== key) sp.textContent = val;
        });
        // Back button
        var backBtn = document.getElementById('backHomeBtn');
        if(backBtn) { var bb = backBtn.querySelector('button'); if(bb) bb.innerHTML = '<i class="fas fa-arrow-left"></i> ' + t('backHome'); }
        // Re-render section titles if on home

            var key = el.getAttribute('data-section');
            if(key) { var val = t(key); if(val && val !== key) el.textContent = val; }
          });
        }
      }

      function addNotification(type, text, fromEmail, link) {
        notifications.unshift({
          type: type,
          text: text,
          from: fromEmail,
          link: link,
          timestamp: Date.now(),
          read: false
        });
        if (notifications.length > 50) notifications.pop();
        localStorage.setItem('pt_notifications', JSON.stringify(notifications));
        updateNotifBadge();
        // Показать всплывающее уведомление если страница активна
        if (document.hidden === false) {
          showToast(text);
        }
      }
      
      function updateNotifBadge() {
        var unread = notifications.filter(function(n) { return !n.read; }).length;
        var badge = document.getElementById('notifBadge');
        if (badge) {
          if (unread > 0) {
            badge.style.display = 'flex';
            badge.textContent = unread > 99 ? '99+' : unread;
          } else {
            badge.style.display = 'none';
          }
        }
      }

      function toggleLike(itemId) {
        if (!currentUser) { showToast('Войдите чтобы лайкать', true); return; }
        var key = itemId + '_' + currentUser.email;
        if (likes[key]) {
          delete likes[key];
        } else {
          likes[key] = true;
          var item = CITY_DATA.marketplace.find(function(i) { return i.id === itemId; });
          if (item) {
            addNotification('like', '❤️ ' + currentUser.name + ' лайкнул ваше объявление: ' + item.title, currentUser.email, 'item=' + itemId);
          }
        }
        localStorage.setItem('pt_likes', JSON.stringify(likes));
      }
      
      function getLikeCount(itemId) {
        return Object.keys(likes).filter(function(k) { return k.startsWith(itemId + '_'); }).length;
      }
      
      function isLiked(itemId) {
        if (!currentUser) return false;
        return likes[itemId + '_' + currentUser.email] === true;
      }
      
      // ЭМОДЗИ РЕАКЦИИ
      function addReaction(itemId, reaction) {
        if (!currentUser) { showToast('Войдите чтобы реагировать', true); return; }
        var key = itemId + '_' + currentUser.email;

        function renderMsgs() {
          var msgs = document.getElementById('pchatMsgs');
          if (!msgs) return;
          var chatData = chats[cid] || [];
          if (chatData.length === 0) {
            msgs.innerHTML = '<div class="pchat-empty"><div style="font-size:3rem;">💬</div><div style="font-weight:600;">Начните общение</div><div style="font-size:0.82rem;">Напишите первое сообщение продавцу</div></div>';
            return;
          }
          msgs.innerHTML = '';
          chatData.forEach(function(m) {
            var d = document.createElement('div');
            d.className = 'pchat-msg ' + (m.sent ? 'sent' : 'received');
            if (m.sticker) {
              d.style.background = 'transparent';
              d.style.border = 'none';
              d.style.boxShadow = 'none';
              d.style.padding = '4px';
              d.innerHTML = '<span style="font-size:2.5rem;">' + m.sticker + '</span>';
            } else if (m.image) {
              d.innerHTML = '<img src="'+m.image+'" style="max-width:200px;border-radius:10px;display:block;cursor:pointer;" onclick="window.open(\''+m.image+'\',\'_blank\')">';
            } else if (m.file) {
              d.innerHTML = '<div class="pchat-file-msg"><span class="file-icon">📎</span><span class="file-name">'+m.fileName+'</span></div>';
            } else {
              d.textContent = m.text;
            }
            var timeDiv = document.createElement('div');
            timeDiv.className = 'pchat-msg-time';
            var timeStr = m.timestamp ? formatTime(m.timestamp) : '';
            if (m.sent) {
              var readIcon = m.read ? '<span class="read-mark">✓✓</span>' : '<span style="opacity:0.6">✓</span>';
              timeDiv.innerHTML = timeStr + ' ' + readIcon;
            } else {
              timeDiv.textContent = timeStr;
            }
            d.appendChild(timeDiv);
            msgs.appendChild(d);
          });
          msgs.scrollTop = msgs.scrollHeight;

          typingTimeout = setTimeout(function() { typingDiv.innerHTML = ''; }, 1500);

        function sendMsg(obj) {
          chats[cid].push(obj);
          localStorage.setItem('pt_chats', JSON.stringify(chats));
          renderMsgs();
          // Simulate read after 2s
          setTimeout(function() {
            var last = chats[cid][chats[cid].length-1];
            if (last && last.sent && !last.read) {
              last.read = true;
              localStorage.setItem('pt_chats', JSON.stringify(chats));
              renderMsgs();
            }
          }, 2000);
        }

          if (typeof containsSpam === 'function' && containsSpam(t2)) { showToast('⚠️ Сообщение содержит запрещённые слова', true); return; }
          sendMsg({ text: t2, sent: true, timestamp: Date.now(), read: false });
          inp.value = ''; typingDiv.innerHTML = '';
        });
        inp.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('pchatSendBtn').click(); }
        });

        // Attach file
        document.getElementById('pchatAttachBtn').addEventListener('click', function() { document.getElementById('pchatFileInput').click(); });
        document.getElementById('pchatFileInput').addEventListener('change', function() {
          Array.from(this.files || []).forEach(function(file) {
            if (file.type.startsWith('image/') || file.type.startsWith('video/')) {
              var reader = new FileReader();
              reader.onload = function(e2) {
                if (file.type.startsWith('image/')) {
                  sendMsg({ image: e2.target.result, sent: true, timestamp: Date.now(), read: false });
                } else {
                  sendMsg({ file: true, fileName: file.name, sent: true, timestamp: Date.now(), read: false });
                }
              };
              reader.readAsDataURL(file);
            } else {
              sendMsg({ file: true, fileName: file.name, sent: true, timestamp: Date.now(), read: false });
            }
          });
          this.value = '';
        });

        // Sticker panel
        document.getElementById('pchatStickerBtn').addEventListener('click', function() {
          var panel = document.getElementById('pchatStickerPanel');
          panel.classList.toggle('open');
        });
        document.querySelectorAll('#pchatStickerPanel .pchat-sticker').forEach(function(s) {
          s.addEventListener('click', function() {
            sendMsg({ sticker: this.getAttribute('data-sticker'), sent: true, timestamp: Date.now(), read: false });
            document.getElementById('pchatStickerPanel').classList.remove('open');
          });
        });

        // Voice
        document.getElementById('pchatVoiceBtn').addEventListener('click', function() {
          if (!('webkitSpeechRecognition' in window)) { showToast('Не поддерживается', true); return; }
          var recognition = new webkitSpeechRecognition();
          recognition.lang = 'ru-RU'; recognition.continuous = false; recognition.interimResults = false;
          this.style.background = 'linear-gradient(135deg,#ef4444,#dc2626)';
          recognition.start();
          var btn = this;
          recognition.onresult = function(event) {
            btn.style.background = '';
            sendMsg({ text: event.results[0][0].transcript, sent: true, timestamp: Date.now(), read: false });
          };
          recognition.onerror = function() { btn.style.background = ''; showToast('Не удалось распознать голос', true); };
        });

          else { showToast('Номер не указан', true); }

          return;
        }
        var html = '<div style="max-height:500px;overflow-y:auto;">';
        notifications.forEach(function(n, idx) {
          var iconClass = '';
          var iconType = '';
          if (n.type === 'like') { iconClass = 'like'; iconType = '❤️'; }
          else if (n.type === 'comment') { iconClass = 'comment'; iconType = '💬'; }
          else if (n.type === 'subscribe') { iconClass = 'subscribe'; iconType = '👤'; }
          else { iconClass = 'comment'; iconType = '📢'; }
          
          html += '<div class="notification-item ' + (n.read ? '' : 'unread') + '" data-idx="' + idx + '">';
          html += '<div class="notification-icon ' + iconClass + '">' + iconType + '</div>';
          html += '<div class="notification-content">';
          html += '<div>' + n.text + '</div>';
          html += '<div class="notification-time">' + new Date(n.timestamp).toLocaleString() + '</div>';
          if (n.link) {
            html += '<button class="btn btn-primary go-notif-link" data-link="' + n.link + '" style="margin-top:5px;font-size:0.7rem;">→ Перейти</button>';
          }
          html += '</div></div>';
          
          if (!n.read) n.read = true;
        });
        html += '</div>';
        localStorage.setItem('pt_notifications', JSON.stringify(notifications));
        updateNotifBadge();
        
        var modal = createModal('🔔 ' + t('notifications'), html);
        setTimeout(function() {
          document.querySelectorAll('.go-notif-link').forEach(function(btn) {
            btn.addEventListener('click', function() {
              var link = this.getAttribute('data-link');
              modal.remove();
              if (link.startsWith('item=')) {
                var itemId = parseInt(link.split('=')[1]);
                var item = CITY_DATA.marketplace.find(function(i) { return i.id === itemId; });
                if (item) showItemDetails(item);
              } else if (link.startsWith('user=')) {
                var email = link.split('=')[1];
                showSellerProfile(email);
              }
            });
          });
        }, 100);
      }

        html += '<a href="mailto:melstroy372@gmail.com" style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:linear-gradient(135deg,#ea4335,#c5221f);color:white;border-radius:14px;text-decoration:none;font-weight:600;font-size:0.9rem;"><i class="fas fa-envelope" style="font-size:1.2rem;"></i><div><div>Email разработчику</div><div style="font-size:0.75rem;opacity:0.85;">melstroy372@gmail.com</div></div></a>';
        html += '<button class="btn" id="settingsChatDevBtn" style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:linear-gradient(135deg,var(--purple),var(--indigo));color:white;border:none;border-radius:14px;font-weight:600;font-size:0.9rem;width:100%;"><i class="fas fa-comment-dots" style="font-size:1.2rem;"></i><div style="text-align:left;"><div>Написать в чат</div><div style="font-size:0.75rem;opacity:0.85;">Внутренний чат</div></div></button>';
        html += '</div></div>';

          document.getElementById('addWallpaperBtn')?.addEventListener('click', function() {
            var fi = document.getElementById('customWallpaperFile');
            if (fi) { fi.value = ''; fi.click(); }
          }, { once: true });
          
          document.getElementById('customWallpaperFile')?.addEventListener('change', function() {
            if (!this.files || !this.files[0]) return;
            var file = this.files[0];
            showToast('⏳ Сжимаем фото...');
            var reader = new FileReader();
            reader.onload = function(e) {
              var img = new Image();
              img.onload = function() {
                var canvas = document.createElement('canvas');
                var w = img.width, h = img.height;
                // Сжимаем до 960px — меньше занимает localStorage
                var maxW = 960, maxH = 640;
                if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
                if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                // Качество 0.65 — обои на фоне, разница незаметна
                var compressed = canvas.toDataURL('image/jpeg', 0.65);
                var kb = Math.round(compressed.length / 1024);
                var key = 'custom_' + Date.now();
                customWallpapers[key] = compressed;
                userSettings.wallpaper = key;

                saveData();
                applyWallpaper();
                modal.remove();
                openSettings();
                showToast('✅ Обои установлены! (' + kb + ' KB)');
              };
              img.onerror = function() { showToast('❌ Не удалось открыть фото', true); };
              img.src = e.target.result;
            };
            reader.onerror = function() { showToast('❌ Ошибка чтения файла', true); };
            reader.readAsDataURL(file);
          }, { once: true });

          document.getElementById('openAdminPanelBtn')?.addEventListener('click', function() {

            }

            openBeautifulAdminPanel();
          });
        }, 100);

      function openDevChat() {
        var modal = document.createElement('div');
        modal.className = 'modal active';
        modal.innerHTML = '<div class="modal-content"><h2>💬 Чат с разработчиком</h2><div class="chat-messages" id="devChatMsgs"></div><div class="chat-input-area"><input id="devChatInput" placeholder="Сообщение..."><button class="btn btn-purple" id="devSendBtn"><i class="fas fa-paper-plane"></i></button></div><button class="btn" id="closeDevChat">Закрыть</button></div>';
        document.body.appendChild(modal);
        var msgs = modal.querySelector('#devChatMsgs');
        var inp = modal.querySelector('#devChatInput');
        function render() {
          msgs.innerHTML = '';
          if(devChat.length===0) msgs.innerHTML = '<div style="padding:20px;">👋 Здравствуйте!</div>';
          devChat.forEach(function(m) {
            var d = document.createElement('div');
            d.className = 'chat-msg ' + (m.sent ? 'sent' : 'received');
            d.textContent = m.text;
            var ts = document.createElement('div');
            ts.className = 'msg-time';
            ts.textContent = formatTime(m.timestamp);
            d.appendChild(ts);
            msgs.appendChild(d);
          });
          msgs.scrollTop = msgs.scrollHeight;
        }
        render();
        modal.querySelector('#devSendBtn').addEventListener('click', function() {
          var t = inp.value.trim();
          if(!t) return;
          devChat.push({ text: t, sent: true, timestamp: Date.now() });
          localStorage.setItem('pt_dev_chat', JSON.stringify(devChat));
          render(); inp.value = '';
          setTimeout(function() {
            devChat.push({ text: 'Спасибо, я отвечу!', sent: false, timestamp: Date.now() });
            localStorage.setItem('pt_dev_chat', JSON.stringify(devChat));
            render();
          }, 1500);
        });
        modal.querySelector('#closeDevChat').addEventListener('click', function() { modal.remove(); });
        modal.addEventListener('click', function(e) { if(e.target===modal) modal.remove(); });
      }

      function renderGrid(gridId, items, type) {
        var grid = document.getElementById(gridId);
        if(!grid) return;
        grid.innerHTML = '';
        if(!items || items.length===0) { grid.innerHTML = '<div style="padding:40px;text-align:center;">' + t('noItems') + '</div>'; return; }
        items.forEach(function(item) {
          var sellerUser = CITY_DATA.users.find(function(u) { return u.email === item.sellerEmail; });
          var sellerOnline = sellerUser ? isOnline(sellerUser.lastActive) : false;
          var card = document.createElement('div');
          card.className = 'card';
          var levelInfo = sellerUser ? getLevel(sellerUser.experience) : null;
          if(levelInfo && levelInfo.name) {
            var lvl = document.createElement('div');
            lvl.className = 'level-badge';
            lvl.textContent = levelInfo.name;
            card.appendChild(lvl);
          }
          if (isBooked(item.id)) {
            var bookBadge = document.createElement('div');
            bookBadge.className = 'booking-badge';
            bookBadge.textContent = '🔒 ЗАБРОНИРОВАНО';
            card.appendChild(bookBadge);
          }
          var imgDiv = document.createElement('div');
          imgDiv.className = 'card-img';
          imgDiv.style.position = 'relative';
          var photos = (item.photos && item.photos.length) ? item.photos.slice() : [];
          var idx = 0;
          function updateImg() {
            imgDiv.innerHTML = '';
            if(photos.length>0 && photos[idx]) {
              var img = document.createElement('img');
              img.src = photos[idx];
              imgDiv.appendChild(img);
              if(photos.length>1) {
                var nav = document.createElement('div');
                nav.className = 'photo-nav';
                photos.forEach(function(_,i) {
                  var d = document.createElement('span');
                  d.className = 'photo-dot'+(i===idx?' active':'');
                  d.addEventListener('click', function(e) { e.stopPropagation(); idx=i; updateImg(); });
                  nav.appendChild(d);
                });
                imgDiv.appendChild(nav);
                var la = document.createElement('button');
                la.className = 'photo-arrow left';
                la.innerHTML = '‹';
                la.addEventListener('click', function(e) { e.stopPropagation(); idx=(idx-1+photos.length)%photos.length; updateImg(); });
                imgDiv.appendChild(la);
                var ra = document.createElement('button');
                ra.className = 'photo-arrow right';
                ra.innerHTML = '›';
                ra.addEventListener('click', function(e) { e.stopPropagation(); idx=(idx+1)%photos.length; updateImg(); });
                imgDiv.appendChild(ra);
              }
            } else {
              imgDiv.textContent = item.img || '📦';
              imgDiv.style.fontSize = '3rem';
            }
            var onlineSpan = document.createElement('div');
            onlineSpan.className = 'online-status ' + (sellerOnline ? '' : 'offline');
            imgDiv.appendChild(onlineSpan);
          }
          updateImg();
          card.appendChild(imgDiv);
          var title = document.createElement('h3');
          title.textContent = item.title;
          card.appendChild(title);
          var info = document.createElement('div');
          info.innerHTML = '<div>📍 '+item.location+' | ⭐ '+item.rating+'</div><div class="price">💰 '+item.price+' '+item.currency+'</div><div><i class="fas fa-phone"></i> '+item.phone+'</div>';
          card.appendChild(info);
          
          var stats = document.createElement('div');
          stats.style.cssText = 'display:flex;gap:10px;align-items:center;margin:5px 0;font-size:0.8rem;';
          var likeCount = getLikeCount(item.id);
          var commentCount = getComments(item.id).length;
          stats.innerHTML = '<span>❤️ ' + likeCount + '</span><span>💬 ' + commentCount + '</span>';
          card.appendChild(stats);
          
          var acts = document.createElement('div');
          acts.className = 'card-actions';
          var liked = isLiked(item.id);
          
          var likeBtn = document.createElement('button');
          likeBtn.className = 'btn like-btn' + (liked ? ' liked' : '');
          likeBtn.innerHTML = '<i class="' + (liked ? 'fas' : 'far') + ' fa-heart"></i>';
          likeBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            toggleLike(item.id);
            var newLiked = isLiked(item.id);
            var newCount = getLikeCount(item.id);
            this.classList.toggle('liked', newLiked);
            this.querySelector('i').className = (newLiked ? 'fas' : 'far') + ' fa-heart';
          });
          acts.appendChild(likeBtn);
          
          var btns = [
            {class:'btn-green', icon:'fa-phone-alt', action:function(){ if(item.phone) window.location.href='tel:'+item.phone; else showToast(t('noNumber'), true); }},
            {class:'btn-primary', icon:'fa-comment', action:function(){ openChatOld(item); }},
            {class:'btn', icon:'fa-share-alt', action:function(){ shareItem(item); }},
            {class:'btn-purple', icon:'fa-store', action:function(){ showSellerProfile(item.sellerEmail); }},
            {class:'btn', icon:favorites.some(function(f){return f.id===item.id})?'fa-heart':'fa-heart', style:favorites.some(function(f){return f.id===item.id})?'color:var(--favorite);':'', action:function(){
              var idx2 = favorites.findIndex(function(f){return f.id===item.id;});
              if(idx2===-1){ favorites.push(item); showToast(t('addToFav')); }
              else{ favorites.splice(idx2,1); showToast(t('removeFromFav')); }
              localStorage.setItem('pt_favorites',JSON.stringify(favorites));
              this.innerHTML = favorites.some(function(f){return f.id===item.id})?'<i class="fas fa-heart" style="color:var(--favorite);"></i>':'<i class="far fa-heart"></i>';
            }},
            {class:'btn-warning', icon:'fa-chart-line', action:function(){ addToCompare(item); }}
          ];
          btns.forEach(function(b){
            var btn = document.createElement('button');
            btn.className = b.class;
            btn.innerHTML = '<i class="fas '+b.icon+'"></i>';
            if(b.style) btn.style.cssText = b.style;
            btn.addEventListener('click', b.action);
            acts.appendChild(btn);
          });
          card.appendChild(acts);
          
          card.addEventListener('click', function() {
            showItemDetails(item);
          });
          
          grid.appendChild(card);
        });
      }

              createModal('Отзыв', '<textarea id="revText" rows="3" placeholder="Ваш отзыв..."></textarea><div class="star-rating" id="starRating"><i class="fa fa-star-o" data-rating="1"></i><i class="fa fa-star-o" data-rating="2"></i><i class="fa fa-star-o" data-rating="3"></i><i class="fa fa-star-o" data-rating="4"></i><i class="fa fa-star-o" data-rating="5"></i></div>', function(m) {
                var text = m.querySelector('#revText').value.trim();
                var stars = m.querySelectorAll('.star-rating i.fa-star');
                var rating = stars.length;
                if(!text || rating===0) { showToast('Заполните поля', true); return false; }
                if(!seller.reviews) seller.reviews = [];
                seller.reviews.push({ author: currentUser.name, rating: rating, text: text, date: new Date().toISOString().split('T')[0] });
                var total = seller.reviews.reduce(function(s,r){ return s+r.rating; },0);
                seller.rating = total / seller.reviews.length;
                seller.experience += 5;
                seller.level = getLevel(seller.experience).name;
                saveData();
                showToast('+5 опыта продавцу');
              });
              setTimeout(function() {
                document.querySelectorAll('#starRating i').forEach(function(star) {
                  star.addEventListener('click', function() {
                    var rating = parseInt(this.getAttribute('data-rating'));
                    document.querySelectorAll('#starRating i').forEach(function(s,idx) {
                      if(idx<rating) s.className = 'fa fa-star';
                      else s.className = 'fa fa-star-o';
                    });
                  });
                });
              }, 100);
            });
          }, 100);
        }
      }

      function renderGridItems(grid, items) {
        grid.innerHTML = '';
        items.forEach(function(item) {
          var card = document.createElement('div');
          card.className = 'card';
          var imgDiv = document.createElement('div');
          imgDiv.className = 'card-img';
          if(item.photos && item.photos.length) { var img=document.createElement('img'); img.src=item.photos[0]; imgDiv.appendChild(img); }
          else { imgDiv.textContent = item.img || '📦'; imgDiv.style.fontSize='3rem'; }
          card.appendChild(imgDiv);
          var title = document.createElement('h3');
          title.textContent = item.title;
          card.appendChild(title);
          var info = document.createElement('div');
          info.innerHTML = '<div>📍 '+item.location+'</div><div class="price">💰 '+item.price+' '+item.currency+'</div>';
          card.appendChild(info);
          card.addEventListener('click', function() { showItemDetails(item); });
          grid.appendChild(card);
        });
      }

      function renderPopularItems() {
        var sorted = [...CITY_DATA.marketplace].sort(function(a,b){ return (b.views||0)-(a.views||0); });
        var top5 = sorted.slice(0,5);
        var sec = document.getElementById('dynamicSections');
        var gridDiv = document.createElement('div');
        gridDiv.className = 'grid';
        gridDiv.id = 'topGrid';
        sec.insertBefore(gridDiv, sec.firstChild);
        var popDiv = document.createElement('div');
        popDiv.className = 'section-title';
        popDiv.setAttribute('data-section', 'popular');
        popDiv.innerHTML = t('popular');
        sec.insertBefore(popDiv, sec.firstChild);
        renderGrid('topGrid', top5, 'market');

      // Показывает скелетоны пока грузится контент
      function showSkeletons(containerId, count) {
        var el = document.getElementById(containerId);
        if (!el) return;
        var html = '';
        for (var i = 0; i < (count || 4); i++) {
          html += '<div class="skeleton-card"></div>';
        }
        el.innerHTML = html;
      }

      function renderAll() {
        var sec = document.getElementById('dynamicSections');
        sec.innerHTML = '';
        document.getElementById('backHomeBtn').style.display = 'none';
        renderPopularItems();
        function add(key, id) {
          var d = document.createElement('div');
          d.className = 'section-title';
          d.setAttribute('data-section', key);
          d.textContent = t(key);
          sec.appendChild(d);
          var g = document.createElement('div');
          g.className = 'grid';
          g.id = id;
          sec.appendChild(g);

        renderGrid('realtyGrid', CITY_DATA.realty, 'realty');
        renderGrid('jobsGrid', CITY_DATA.jobs, 'job');
        renderGrid('businessGrid', CITY_DATA.business, 'business');
        renderGrid('eduGrid', CITY_DATA.education, 'edu');
      }

      function filterCategory(cat) {
        if(cat==='Все') { renderAll(); return; }
        var filtered = CITY_DATA.marketplace.filter(function(i){ return i.category===cat; });
        var sec = document.getElementById('dynamicSections');
        sec.innerHTML = '<div class="section-title">🔍 '+cat+' ('+filtered.length+')</div><div class="grid" id="filterGrid"></div>';
        renderGrid('filterGrid', filtered, 'market');
        document.getElementById('backHomeBtn').style.display = 'block';

      var CAT_ICONS = { 'Все':'🏠', 'Электроника':'📱', 'Авто':'🚗', 'Недвижимость':'🏠', 'Работа':'💼', 'Бизнес':'🏪', 'Обучение':'🎓', 'Мебель':'🛋️' };
      function renderCategories() {
        var c = document.getElementById('categoryContainer');
        c.innerHTML = '';
        CITY_DATA.categories.forEach(function(cat) {
          var s = document.createElement('span');
          s.className = 'cat' + (cat==='Все'?' active':'');
          var icon = CAT_ICONS[cat] || '🔖';
          s.innerHTML = icon + ' ' + cat;

            document.querySelectorAll('.cat').forEach(function(x){ x.classList.remove('active'); });

            filterCategory(cat);

      function renderAdminStats() {

      function renderAdminListings() {
        var html = '<h3>📦 Объявления</h3>';
        CITY_DATA.marketplace.forEach(function(item) {
          html += '<div class="moderation-item"><div><strong>'+item.title+'</strong><br>'+item.seller+'</div><div><button class="btn btn-danger del-item" data-id="'+item.id+'"><i class="fas fa-trash"></i> Удалить</button></div></div>';
        });
        if(CITY_DATA.marketplace.length===0) html+='<p>Нет</p>';
        document.getElementById('adminListingsPanel').innerHTML = html;
        document.querySelectorAll('.del-item').forEach(function(b) {
          b.addEventListener('click', function() {
            var id = parseInt(this.getAttribute('data-id'));
            if(confirm('Удалить?')) {
              var deletedItem = CITY_DATA.marketplace.find(function(i){ return i.id===id; });
              CITY_DATA.marketplace = CITY_DATA.marketplace.filter(function(i){ return i.id!==id; });
              favorites = favorites.filter(function(f){ return f.id!==id; });
              localStorage.setItem('pt_favorites',JSON.stringify(favorites));
              saveData();
              renderAdminListings();
              renderAdminStats();
              renderAll();
              showToast('Удалено');
              // Удалить из Firestore
              if (deletedItem && deletedItem.firestoreId && window._firebase && window._firebase.db && window._firebase.auth.app.options.apiKey !== 'YOUR_API_KEY') {
                window._firebase.deleteDoc(window._firebase.doc(window._firebase.db, 'marketplace', deletedItem.firestoreId))
                  .catch(function(e){ console.warn('Firestore delete error:', e); });

          });

      function renderAdminUsers() {
        var html = '<h3>👥 Пользователи</h3>';
        CITY_DATA.users.forEach(function(user) {
          var isAdmin = user.role==='admin';
          html += '<div class="user-item"><div><strong>'+user.name+'</strong><br>🆔 '+user.userId+'<br>'+user.email+'<br><span class="role-badge '+user.role+'">'+(user.role==='admin'?'👑 Админ':'👤 Пользователь')+'</span><br>'+(user.banned?'🔴 ЗАБАНЕН':'🟢 Активен')+'</div><div>';
          if(!isAdmin && user.email !== SECRET_ADMIN_EMAIL) {
            html += '<button class="btn btn-warning make-admin-btn" data-id="'+user.id+'"><i class="fas fa-crown"></i> Админ</button>';
            if(!user.banned) html += '<button class="btn btn-danger ban-user-btn" data-id="'+user.id+'"><i class="fas fa-ban"></i> Забанить</button>';
            else html += '<button class="btn btn-green unban-user-btn" data-id="'+user.id+'"><i class="fas fa-check"></i> Разбанить</button>';
          }
          if(user.id!==1 && !isAdmin) html += '<button class="btn btn-danger delete-user-btn" data-id="'+user.id+'"><i class="fas fa-trash"></i> Удалить</button>';
          html += '</div></div>';
        });
        document.getElementById('adminUsersPanel').innerHTML = html;
        document.querySelectorAll('.make-admin-btn').forEach(function(b) {
          b.addEventListener('click', function() {
            var id = parseInt(this.getAttribute('data-id'));
            var user = CITY_DATA.users.find(function(u){ return u.id===id; });
            if(user && user.role!=='admin' && user.email !== SECRET_ADMIN_EMAIL) {
              user.role = 'admin';
              saveData();
              renderAdminUsers();
              showToast(user.name+' теперь админ');
              if(currentUser && currentUser.id===id) { currentUser.role='admin'; localStorage.setItem('pt_user',JSON.stringify(currentUser)); updateUI(); }
            } else { showToast('Нельзя изменить секретного админа', true); }
          });
        });
        document.querySelectorAll('.ban-user-btn').forEach(function(b) {
          b.addEventListener('click', function() {
            var id = parseInt(this.getAttribute('data-id'));
            var user = CITY_DATA.users.find(function(u){ return u.id===id; });
            if(user && user.email !== SECRET_ADMIN_EMAIL) { user.banned = true; saveData(); renderAdminUsers(); showToast(user.name+' забанен'); }
            else { showToast('Нельзя забанить секретного админа', true); }
          });
        });
        document.querySelectorAll('.unban-user-btn').forEach(function(b) {
          b.addEventListener('click', function() {
            var id = parseInt(this.getAttribute('data-id'));
            var user = CITY_DATA.users.find(function(u){ return u.id===id; });
            if(user) { user.banned = false; saveData(); renderAdminUsers(); showToast(user.name+' разбанен'); }
          });
        });
        document.querySelectorAll('.delete-user-btn').forEach(function(b) {
          b.addEventListener('click', function() {
            var id = parseInt(this.getAttribute('data-id'));
            var user = CITY_DATA.users.find(function(u){ return u.id===id; });
            if(user && user.email !== SECRET_ADMIN_EMAIL && confirm('Удалить?')) {
              CITY_DATA.users = CITY_DATA.users.filter(function(u){ return u.id!==id; });
              saveData();
              renderAdminUsers();
              renderAdminStats();
              showToast('Удалён');
            } else { showToast('Нельзя удалить секретного админа', true); }
          });
        });
      }

        var html = '<h3>📰 Управление новостями</h3><button class="btn btn-primary" id="adminAddBlogPost">+ Добавить новость</button><div id="adminBlogList">';

          btn.addEventListener('click', function() {
            var id = parseInt(this.getAttribute('data-id'));
            blogPosts = blogPosts.filter(function(p) { return p.id !== id; });
            localStorage.setItem('pt_blog_posts', JSON.stringify(blogPosts));
            renderAdminBlog();
            showToast('Новость удалена');
          });

        document.getElementById('adminAddBlogPost')?.addEventListener('click', function() {
          var modal = createModal('Новая новость', '<input id="blogTitle" placeholder="Заголовок"><textarea id="blogContent" rows="5" placeholder="Текст новости..."></textarea>', function(m) {
            var title = m.querySelector('#blogTitle').value.trim();
            var content = m.querySelector('#blogContent').value.trim();
            if (title && content && currentUser) {
              blogPosts.unshift({
                id: Date.now(),
                title: title,
                content: content,
                author: currentUser.name,
                date: new Date().toISOString(),

                comments: []
              });
              localStorage.setItem('pt_blog_posts', JSON.stringify(blogPosts));

        });
        html += '</div>';
        document.getElementById('adminPromocodesPanel').innerHTML = html;
        document.querySelectorAll('.delete-promo').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var idx = parseInt(this.getAttribute('data-idx'));
            promocodes.splice(idx, 1);
            localStorage.setItem('pt_promocodes', JSON.stringify(promocodes));
            renderAdminPromocodes();
            showToast('Промокод удалён');
          });
        });
        document.getElementById('addPromoBtn')?.addEventListener('click', function() {
          var code = document.getElementById('newPromoCode').value.trim().toUpperCase();
          var discount = parseFloat(document.getElementById('newPromoDiscount').value);
          var type = document.getElementById('newPromoType').value;
          if (code && discount > 0) {
            promocodes.push({ code: code, discount: discount, type: type, usedBy: [], expires: Date.now() + 30*24*60*60*1000 });
            localStorage.setItem('pt_promocodes', JSON.stringify(promocodes));
            renderAdminPromocodes();
            showToast('Промокод добавлен');
            document.getElementById('newPromoCode').value = '';
            document.getElementById('newPromoDiscount').value = '';
          } else {
            showToast('Заполните поля корректно', true);
          }
        });
      }

          function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
          resize(); window.addEventListener('resize', resize);
          for (var i = 0; i < 60; i++) {
            pts.push({ x: Math.random()*W, y: Math.random()*H, vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4,
              r: Math.random()*1.5+0.5, c: ['#0ea5e9','#8b5cf6','#ec4899','#f59e0b','#10b981'][Math.floor(Math.random()*5)] });
          }
          function draw() {
            if (!document.getElementById('bap-particles')) return;
            ctx.clearRect(0,0,W,H);
            pts.forEach(function(p) {
              p.x += p.vx; p.y += p.vy;
              if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
              if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
              ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
              ctx.fillStyle = p.c; ctx.shadowBlur = 6; ctx.shadowColor = p.c; ctx.fill();
            });

              for (var j=i+1;j<pts.length;j++) {
                var d = Math.hypot(a.x-pts[j].x,a.y-pts[j].y);
                if (d < 80) {

                  ctx.strokeStyle = 'rgba(14,165,233,'+(0.15*(1-d/80))+')';

      function createModal(title, innerHtml, onSave) {
        var modal = document.createElement('div');
        modal.className = 'modal active';
        var content = document.createElement('div');
        content.className = 'modal-content';
        content.innerHTML = '<h2>'+title+'</h2>'+innerHtml;
        if(onSave) {
          var saveBtn = document.createElement('button');
          saveBtn.className = 'btn btn-primary';
          saveBtn.textContent = 'Сохранить';
          saveBtn.addEventListener('click', function() { var r = onSave(content); if(r!==false) modal.remove(); });
          content.appendChild(saveBtn);
        }
        var closeBtn = document.createElement('button');
        closeBtn.className = 'btn';
        closeBtn.textContent = 'Закрыть';
        closeBtn.addEventListener('click', function() { modal.remove(); });
        content.appendChild(closeBtn);
        modal.appendChild(content);
        modal.addEventListener('click', function(e) { if(e.target===modal) modal.remove(); });
        document.body.appendChild(modal);
        return modal;
      }

      function openLogin() {
        var modal = createModal('', '', null);
